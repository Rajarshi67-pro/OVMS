<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Vote — Bharat Vote 🇮🇳</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Enhanced CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Global Navbar (Glassmorphism) -->
    <nav class="navbar" id="mainNav">
        <div class="nav-container">
            <div class="nav-brand" onclick="window.location.href='index.html'">
                <span class="brand-icon">🇮🇳</span>
                <span class="brand-text">Bharat Vote</span>
            </div>
            
            <div class="nav-links" id="navLinks">
                <!-- Status Indicators -->
                <div class="nav-status">
                    <span id="networkStatus" class="status-badge"></span>
                </div>
                
                <!-- Dynamic Auth Buttons -->
                <div id="navAuthArea">
                    <button class="btn btn-outline" onclick="window.location.href='index.html'">Back to Home</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="app-main fade" id="appMain">
        <div class="view-section fade-in">
            <div class="dashboard-header">
                <h2>Cast Your Vote</h2>
                <p class="muted">Review the candidates carefully.</p>
            </div>

            <!-- Elections Grid -->
            <div id="elections" class="elections-grid mt-4">
                <!-- Loading indicator -> Will be replaced by script.js -->
                <p>Loading election data...</p>
            </div>
        </div>
    </main>

    <!-- Toast container for notifications -->
    <div id="ovms-toast-container"></div>

    <script type="module" src="script.js"></script>
    <script>
        // Fade in
        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add("page-loaded");
            document.getElementById('appMain').style.opacity = 1;
        });

        // Toast logic to match SPA design
        function showToast(message, type = 'success') {
            const container = document.getElementById('ovms-toast-container');
            if (!container) return;
            const t = document.createElement('div');
            t.className = `ovms-toast ${type}`;
            t.textContent = message;
            container.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translateY(-10px)';
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        window.addEventListener('vote:success', (e) => {
            const msg = (e && e.detail && e.detail.message) ? e.detail.message : 'Vote succeeded';
            showToast(msg, 'success');
        });

        window.addEventListener('vote:error', (e) => {
            const msg = (e && e.detail && e.detail.message) ? e.detail.message : 'Vote failed';
            showToast(msg, 'error');
        });

        // network status mirror
        function updateNetworkMirror() {
            const el = document.getElementById('networkStatus');
            el.textContent = navigator.onLine ? 'Online ✔' : 'Offline — Demo';
            el.className = navigator.onLine ? 'status-badge online' : 'status-badge offline';
        }
        window.addEventListener('online', updateNetworkMirror);
        window.addEventListener('offline', updateNetworkMirror);
        updateNetworkMirror();

        // If an electionId param is present, load that single election
        const params = new URLSearchParams(location.search);
        const electionId = params.get('electionId');
        function whenAvailable(name, cb) {
            if (window[name]) return cb();
            const t = setInterval(() => { if (window[name]) { clearInterval(t); cb(); } }, 50);
            setTimeout(() => clearInterval(t), 5000);
        }
        if (electionId) {
            whenAvailable('loadElectionById', () => { try { window.loadElectionById(electionId); } catch (e) { console.error(e); } });
        } else {
            // fallback
            whenAvailable('loadElections', () => { try { window.loadElections(); } catch (e) {} });
        }
    </script>
</body>
</html>
